<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ops KB Assistant</title>
<script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f7f8fb;
    color: #1c1f2b;
  }
  .header {
    background: #12143d;
    color: #fff;
    padding: 14px 18px;
    border-radius: 8px 8px 0 0;
  }
  .header .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px; height: 28px;
    background: #d4a017;
    color: #12143d;
    font-weight: 700;
    border-radius: 6px;
    margin-right: 10px;
    font-size: 13px;
  }
  .header-row { display: flex; align-items: center; }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-sub { font-size: 11px; color: #c7c9e6; margin-top: 2px; }
  .body-wrap { background: #fff; border: 1px solid #e5e7f0; border-top: none; border-radius: 0 0 8px 8px; padding: 14px 16px 18px; }
  textarea {
    width: 100%;
    min-height: 54px;
    resize: vertical;
    border: 1px solid #d7d9e6;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 13px;
    font-family: inherit;
  }
  .submit-row { display: flex; justify-content: flex-end; margin-top: 8px; }
  button#askBtn {
    background: #12143d;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  button#askBtn:disabled { opacity: 0.6; cursor: default; }
  .chips { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    background: #f0f1fa;
    border: 1px solid #e0e2f2;
    color: #33365a;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 999px;
    cursor: pointer;
  }
  .chip:hover { background: #e5e7f8; }
  .answer-block { margin-top: 16px; }
  .answer-label { font-size: 11px; font-weight: 700; letter-spacing: .04em; color: #8a8da8; text-transform: uppercase; margin-bottom: 6px; }
  .answer-text { font-size: 13.5px; line-height: 1.55; white-space: pre-wrap; min-height: 20px; }
  .disclaimer { font-size: 10.5px; color: #9497b3; margin-top: 10px; border-top: 1px solid #eee; padding-top: 8px; }
  .copy-btn {
    display: none;
    margin-top: 10px;
    background: none;
    border: 1px solid #d7d9e6;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 11.5px;
    cursor: pointer;
    color: #33365a;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid #d7d9e6;
    border-top-color: #12143d;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { color: #c0392b; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="badge">GC</div>
    <div>
      <div class="header-title">Ops KB Assistant</div>
      <div class="header-sub">SEBI RIA Reg. INA200005380 &middot; Instant answers for client queries</div>
    </div>
  </div>
</div>

<div class="body-wrap">
  <textarea id="query" placeholder="e.g. Client wants to update nominee after father's death. What documents needed?"></textarea>

  <div class="submit-row">
    <button id="askBtn" onclick="askKB()">Ask</button>
  </div>

  <div class="chips" id="chips"></div>

  <div class="answer-block" id="answerBlock" style="display:none;">
    <div class="answer-label">Answer</div>
    <div class="answer-text" id="answerText"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyAnswer()">Copy answer</button>
  </div>

  <div class="disclaimer">SEBI RIA Reg. INA200005380 &middot; PMS Reg. INP000006563 &middot; Always verify with ops team before communicating to client</div>
</div>

<script>
var CHIP_LABELS = ["Nominee update","KYC invalid","Bank mandate","NRI onboarding","Contact update","Transmission","Investwell issue","Video KYC","Bond investment","CAS download"];

var chipsEl = document.getElementById('chips');
CHIP_LABELS.forEach(function(label){
  var c = document.createElement('div');
  c.className = 'chip';
  c.textContent = label;
  c.onclick = function(){ document.getElementById('query').value = label + ' - '; document.getElementById('query').focus(); };
  chipsEl.appendChild(c);
});

// -----------------------------------------------------------------
// SYSTEM PROMPT / KB CONTENT
// KB content is bundled as kb_content.txt alongside this widget.html in
// the same zip, and loaded once at startup. Full 5-category ops KB
// (Mutual Fund Folio Management, NRI Investor Queries, Bond Investment
// Queries, KYC & Compliance, Investwell Mint Software & Video Guides).
// Note: this is the TEXT of the KB only — the 160+ embedded screenshots
// in the source document are not yet described/captioned for the model,
// so answers reference steps/fields by name but can't "see" the images.
// -----------------------------------------------------------------
var PREAMBLE = "You are the Ops KB Assistant for Guardian Capital Investment Advisors (GCIA), a SEBI-registered investment advisor (Reg. INA200005380). Answer ops queries from business team members strictly using the knowledge base below. If the answer is not in the KB, say so plainly and recommend checking with the ops team directly. Be concise and step-by-step where relevant. Do not invent SRN numbers, timelines, or steps not present in the KB.\n\n--- KNOWLEDGE BASE ---\n";

var KB_CONTENT = ""; // loaded from kb_content.txt at init
var ANTHROPIC_API_KEY = ""; // filled in from Zoho Variable at init

function initWidget(){
  ZOHO.embeddedApp.on("PageLoad", function(){
    ZOHO.CRM.CONNECTION.invokeUrl
      ? fetchKeyViaConnection()
      : fetchKeyViaVariable();
    loadKBContent();
  });
  ZOHO.embeddedApp.init();
}

function loadKBContent(){
  fetch('./kb_content.txt')
    .then(function(res){ return res.text(); })
    .then(function(text){ KB_CONTENT = text; })
    .catch(function(err){ console.error("KB content load error:", err); });
}

function fetchKeyViaVariable(){
  ZOHO.CRM.API.getOrgVariable("ANTHROPIC_API_KEY").then(function(data){
    if (data && data.Success && data.Success.Content) {
      ANTHROPIC_API_KEY = data.Success.Content;
    } else {
      console.error("Could not read ANTHROPIC_API_KEY variable:", data);
    }
  }).catch(function(err){
    console.error("Variable fetch error:", err);
  });
}

function fetchKeyViaConnection(){
  // Fallback path if org variable API isn't available in this SDK version
  fetchKeyViaVariable();
}

async function askKB(){
  var query = document.getElementById('query').value.trim();
  if (!query) return;

  var btn = document.getElementById('askBtn');
  var answerBlock = document.getElementById('answerBlock');
  var answerText = document.getElementById('answerText');
  var copyBtn = document.getElementById('copyBtn');

  btn.disabled = true;
  answerBlock.style.display = 'block';
  copyBtn.style.display = 'none';
  answerText.innerHTML = '<span class="spinner"></span>';

  if (!ANTHROPIC_API_KEY) {
    answerText.innerHTML = '<span class="err">API key not loaded from Zoho Variables. Check Developer Hub &gt; Variables &gt; ANTHROPIC_API_KEY.</span>';
    btn.disabled = false;
    return;
  }

  if (!KB_CONTENT) {
    answerText.innerHTML = '<span class="err">Knowledge base still loading. Please wait a moment and try again.</span>';
    btn.disabled = false;
    return;
  }

  try {
    var response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": ANTHROPIC_API_KEY,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5",
        max_tokens: 1000,
        system: [
          {
            type: "text",
            text: PREAMBLE + KB_CONTENT,
            cache_control: { type: "ephemeral" }
          }
        ],
        messages: [{ role: "user", content: query }]
      })
    });

    if (!response.ok) {
      var errBody = await response.text();
      console.error("Anthropic API error:", response.status, errBody);
      answerText.innerHTML = '<span class="err">Request failed (status ' + response.status + '). Check console for details.</span>';
      btn.disabled = false;
      return;
    }

    var data = await response.json();
    var answer = (data.content && data.content[0] && data.content[0].text) || 'No answer found. Please check with ops team directly.';

    answerText.textContent = '';
    copyBtn.style.display = 'inline-block';
    copyBtn.dataset.answer = answer;

    var i = 0;
    var interval = setInterval(function(){
      answerText.textContent = answer.slice(0, i);
      i += 4;
      if (i > answer.length) { answerText.textContent = answer; clearInterval(interval); }
    }, 8);

  } catch (err) {
    console.error("Fetch error:", err);
    answerText.innerHTML = '<span class="err">Could not connect. Please try again or check with ops team directly.</span>';
  }

  btn.disabled = false;
}

function copyAnswer(){
  var copyBtn = document.getElementById('copyBtn');
  var text = copyBtn.dataset.answer || '';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
    copyBtn.textContent = 'Copied!';
    setTimeout(function(){ copyBtn.textContent = 'Copy answer'; }, 1500);
  }
}

if (typeof ZOHO !== 'undefined') {
  initWidget();
}
</script>
</body>
</html>
